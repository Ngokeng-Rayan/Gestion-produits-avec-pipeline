# Configuration pour le chargement automatique des dashboards
apiVersion: 1

providers:
  - name: 'Laravel API Dashboards'
    orgId: 1
    folder: 'Laravel Monitoring'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
