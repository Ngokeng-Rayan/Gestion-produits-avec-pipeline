apiVersion: 1

policies:
  - orgId: 1
    receiver: Email Rayan
    group_by: ['alertname', 'grafana_folder']
    group_wait: 10s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: Email Rayan
        matchers:
          - severity = critical
        group_wait: 10s
        group_interval: 2m
        repeat_interval: 1h
        continue: false
      - receiver: Email Rayan
        matchers:
          - severity = warning
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        continue: false
