# Configuration Logstash pour collecter les logs Laravel

input {
  # Lecture des logs Laravel depuis un fichier
  file {
    path => "/var/www/storage/logs/laravel*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => multiline {
      pattern => "^\[\d{4}-\d{2}-\d{2}"
      negate => true
      what => "previous"
    }
    tags => ["laravel", "application"]
  }

  # Écoute sur le port TCP pour les logs en temps réel
  tcp {
    port => 5000
    codec => json
    tags => ["laravel", "tcp"]
  }

  # Écoute sur le port UDP (optionnel)
  udp {
    port => 5000
    codec => json
    tags => ["laravel", "udp"]
  }
}

filter {
  # Filtrage et parsing des logs Laravel
  if "laravel" in [tags] {
    
    # Parser les logs au format Laravel standard
    grok {
      match => {
        "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] %{DATA:environment}\.%{DATA:level}: %{GREEDYDATA:message}"
      }
      overwrite => ["message"]
    }

    # Parser les logs JSON si présents
    if [message] =~ /^\{.*\}$/ {
      json {
        source => "message"
        target => "log_data"
      }
    }

    # Convertir le niveau de log en minuscules
    mutate {
      lowercase => ["level"]
    }

    # Ajouter des champs personnalisés
    mutate {
      add_field => {
        "application" => "laravel-api"
        "service" => "gestion-produit"
      }
    }

    # Parser la date
    date {
      match => ["timestamp", "yyyy-MM-dd HH:mm:ss", "ISO8601"]
      target => "@timestamp"
    }

    # Extraire les informations de contexte si disponibles
    if [log_data][context] {
      mutate {
        add_field => {
          "user_id" => "%{[log_data][context][user_id]}"
          "request_id" => "%{[log_data][context][request_id]}"
          "ip_address" => "%{[log_data][context][ip]}"
        }
      }
    }
  }

  # Supprimer les champs inutiles
  mutate {
    remove_field => ["host", "path"]
  }
}

output {
  # Envoi vers Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "laravel-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # Affichage dans la console pour debug (à désactiver en production)
  stdout {
    codec => rubydebug
  }
}
