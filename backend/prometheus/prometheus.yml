# Configuration Prometheus pour Laravel API
global:
  scrape_interval: 15s # Collecte des métriques toutes les 15 secondes
  evaluation_interval: 15s # Évaluation des règles toutes les 15 secondes
  external_labels:
    monitor: 'laravel-api-monitor'
    environment: 'production'

# Configuration des alertes
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Règles d'alerte (chargées depuis des fichiers)
rule_files:
  - "alerts/*.yml"

# Configuration des cibles à surveiller
scrape_configs:
  # Surveillance de Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Surveillance de l'application Laravel (local — php artisan serve)
  - job_name: 'laravel-api-local'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'laravel-api'
          environment: 'local'

  # Surveillance de l'application Laravel (production o2switch)
  - job_name: 'laravel-api-production'
    scrape_interval: 30s
    metrics_path: '/metrics'
    scheme: https
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ['ngokeng.cdwfs.net']
        labels:
          service: 'laravel-api'
          environment: 'production'

  # Node Exporter pour les métriques système (CPU, RAM, Disque)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'system'
          instance: 'laravel-server'
