name: Gestion Produit Pipeline

# Déclenchement du pipeline
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

# Variables d'environnement globales
env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # JOB 1 : PREPARATION - Installation des dépendances backend
  # ==========================================
  preparation:
    name: Préparation & Installation des Dépendances
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, bcmath, pdo, pdo_mysql, zip, gd
          coverage: none
          tools: composer:v2

      - name: Mise en cache des dépendances Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Installation des dépendances Composer
        run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader

      - name: Sauvegarde du dossier vendor
        uses: actions/upload-artifact@v4
        with:
          name: vendor-${{ github.sha }}
          path: backend/vendor/
          retention-days: 1

  # ==========================================
  # JOB 2 : LINT - Vérification du style de code
  # ==========================================
  verification-style:
    name: Vérification du Style de Code
    runs-on: ubuntu-latest
    needs: preparation
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json
          coverage: none

      - name: Téléchargement du dossier vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor-${{ github.sha }}
          path: backend/vendor/

      - name: Exécution de Laravel Pint
        run: php vendor/bin/pint --test

  # ==========================================
  # JOB 3 : SECURITY SCAN - Analyse statique
  # ==========================================
  analyse-securite:
    name: Analyse de Sécurité & Statique
    runs-on: ubuntu-latest
    needs: preparation
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json
          coverage: none

      - name: Téléchargement du dossier vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor-${{ github.sha }}
          path: backend/vendor/

      - name: Exécution de l'analyse PHPStan
        run: php vendor/bin/phpstan analyse --memory-limit=2G
        continue-on-error: true

      - name: Vérification des vulnérabilités des dépendances
        run: composer audit --no-interaction
        continue-on-error: true

  # ==========================================
  # JOB 4 : TESTS - Tests unitaires et d'intégration
  # ==========================================
  tests:
    name: Tests Unitaires & d'Intégration
    runs-on: ubuntu-latest
    needs: preparation
    defaults:
      run:
        working-directory: backend

    # Service MySQL pour les tests d'intégration
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: testing_db
          MYSQL_USER: testing_user
          MYSQL_PASSWORD: testing_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, bcmath, pdo, pdo_mysql, zip, gd
          coverage: none

      - name: Téléchargement du dossier vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor-${{ github.sha }}
          path: backend/vendor/

      - name: Copie du fichier .env
        run: cp .env.example .env

      - name: Génération de la clé d'application
        run: php artisan key:generate

      # Tests unitaires avec SQLite (rapides)
      - name: Création de la base SQLite pour les tests unitaires
        run: touch database/database.sqlite

      - name: Exécution des migrations (SQLite)
        run: php artisan migrate --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Exécution des Tests Unitaires
        run: php artisan test --testsuite=Unit
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      # Tests d'intégration avec MySQL (plus réalistes)
      - name: Exécution des migrations (MySQL)
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing_db
          DB_USERNAME: testing_user
          DB_PASSWORD: testing_password

      - name: Peuplement de la base de données pour les tests
        run: php artisan db:seed --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing_db
          DB_USERNAME: testing_user
          DB_PASSWORD: testing_password

      - name: Exécution des Tests d'Intégration
        run: php artisan test --testsuite=Feature
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing_db
          DB_USERNAME: testing_user
          DB_PASSWORD: testing_password

      - name: Sauvegarde des résultats des tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultats-tests-${{ github.sha }}
          path: |
            backend/storage/logs/
            backend/tests/results/
          retention-days: 7

  # ==========================================
  # JOB 5 : FRONTEND - Build & Test
  # ==========================================
  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        run: npm ci
        working-directory: frontend

      - name: Build du frontend
        run: npm run build
        working-directory: frontend

      - name: Sauvegarde du build frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  # ==========================================
  # JOB 6 : DOCKER BUILD & DEPLOY - Construction et déploiement
  # ==========================================
  construction-et-deploiement-docker:
    name: Construction & Déploiement Docker
    runs-on: ubuntu-latest
    needs: [verification-style, analyse-securite, tests, frontend-build]

    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Récupération de la date pour le versioning
        id: date
        run: echo "date=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Définition des tags Docker (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/gestion-produit-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=v${{ steps.date.outputs.date }},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Construction et publication de l'image Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          build-args: |
            user=laravel
            uid=1000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Affichage des informations de l'image
        run: |
          echo "Image Docker construite et publiée avec succès"
          echo "Tags créés:"
          echo "${{ steps.meta-backend.outputs.tags }}"

      - name: Résumé du déploiement
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Déploiement en production réussi"
          echo "Image: ${{ secrets.DOCKER_USERNAME }}/gestion-produit-api"
          echo "Tags: latest, v${{ steps.date.outputs.date }}, sha-${{ github.sha }}"
          echo "Docker Hub: https://hub.docker.com/r/${{ secrets.DOCKER_USERNAME }}/gestion-produit-api"
          echo "SHA: ${{ github.sha }}"
          echo "Auteur: ${{ github.actor }}"
          echo "Commit: ${{ github.event.head_commit.message }}"
