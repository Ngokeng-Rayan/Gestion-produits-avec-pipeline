name: CI/CD — Gestion Produits Pipeline

# ─────────────────────────────────────────────
#  Déclenchement
# ─────────────────────────────────────────────
on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  #  CI-1 : BACKEND — Lint, Analyse & Tests
  # ─────────────────────────────────────────────
  backend-ci:
    name: "\U0001F418 Backend — Lint, Analyse & Tests"
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: testing_db
          MYSQL_USER: testing_user
          MYSQL_PASSWORD: testing_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, json, bcmath, pdo, pdo_mysql, pdo_sqlite, sqlite3, zip, gd
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader

      # ── Lint ──
      - name: Laravel Pint (code style)
        working-directory: backend
        run: php vendor/bin/pint --test
        continue-on-error: true

      # ── Analyse statique ──
      - name: PHPStan (analyse statique)
        working-directory: backend
        run: php vendor/bin/phpstan analyse --memory-limit=2G
        continue-on-error: true

      - name: Composer audit (vulnérabilités)
        working-directory: backend
        run: composer audit --no-interaction
        continue-on-error: true

      # ── Préparation env ──
      - name: Prepare .env
        working-directory: backend
        run: |
          printf '%s\n' \
            "APP_NAME=GestionProduits" \
            "APP_ENV=testing" \
            "APP_KEY=" \
            "APP_DEBUG=true" \
            "APP_URL=http://localhost" \
            "DB_CONNECTION=sqlite" \
            "DB_DATABASE=database/database.sqlite" \
            "LOG_CHANNEL=single" \
            "CACHE_DRIVER=file" \
            "SESSION_DRIVER=file" > .env
          php artisan key:generate

      # ── Tests unitaires (SQLite — rapides) ──
      - name: Migrations SQLite
        working-directory: backend
        run: |
          touch database/database.sqlite
          php artisan migrate --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Tests unitaires (SQLite)
        working-directory: backend
        run: php artisan test --testsuite=Unit --stop-on-failure
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      # ── Tests d'intégration (MySQL — réalistes) ──
      - name: Migrations MySQL
        working-directory: backend
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing_db
          DB_USERNAME: testing_user
          DB_PASSWORD: testing_password

      - name: Seed MySQL
        working-directory: backend
        run: php artisan db:seed --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing_db
          DB_USERNAME: testing_user
          DB_PASSWORD: testing_password

      - name: Tests d'intégration (MySQL)
        working-directory: backend
        run: php artisan test --testsuite=Feature --exclude-group=monitoring --stop-on-failure
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing_db
          DB_USERNAME: testing_user
          DB_PASSWORD: testing_password

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs-${{ github.sha }}
          path: backend/storage/logs/
          retention-days: 7

  # ─────────────────────────────────────────────
  #  CI-2 : FRONTEND — TypeScript, Build
  # ─────────────────────────────────────────────
  frontend-ci:
    name: "\u269B\uFE0F  Frontend — TypeScript & Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check + Build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  #  CD-1 : DOCKER — Build & Push (main only)
  # ─────────────────────────────────────────────
  docker-build:
    name: "\U0001F433 Docker — Build & Push"
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get date tag
        id: date
        run: echo "date=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Docker meta — Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/gestion-produit-api
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=v${{ steps.date.outputs.date }}

      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          build-args: |
            user=laravel
            uid=1000
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Résumé Docker
        run: |
          echo "✅ Image publiée sur Docker Hub :"
          echo "   🔹 ${{ secrets.DOCKER_USERNAME }}/gestion-produit-api"
          echo "   Tags: ${{ steps.meta-backend.outputs.tags }}"
          echo "   SHA: ${{ github.sha }}"
          echo "   Auteur: ${{ github.actor }}"

  # ─────────────────────────────────────────────
  #  CD-2 : DEPLOY FRONTEND → o2switch
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: "\U0001F680 Deploy Frontend \u2192 ngokeng.cdwfs.net"
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        env:
          VITE_API_BASEURL: https://ngokeng.cdwfs.net/api
        run: |
          npm ci
          npm run build

      - name: Deploy dist/ → o2switch via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.O2SWITCH_FTP_HOST }}
          username: ${{ secrets.O2SWITCH_FTP_USER }}
          password: ${{ secrets.O2SWITCH_FTP_PASSWORD }}
          local-dir: frontend/dist/
          server-dir: ${{ secrets.O2SWITCH_FRONTEND_FTP_PATH }}
          exclude: |
            **/.git*
            **/.git*/**

  # ─────────────────────────────────────────────
  #  CD-3 : DEPLOY BACKEND → o2switch
  #  ⚠️  Après le 1er déploiement, lancer dans le
  #  terminal cPanel : composer install && php artisan migrate
  # ─────────────────────────────────────────────
  deploy-backend:
    name: "\U0001F680 Deploy Backend \u2192 o2switch (FTP)"
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Créer le fichier .env de production
        run: |
          printf '%s\n' \
            "APP_NAME=GestionProduits" \
            "APP_ENV=production" \
            "APP_KEY=${{ secrets.APP_KEY }}" \
            "APP_DEBUG=false" \
            "APP_URL=https://ngokeng.cdwfs.net" \
            "" \
            "DB_CONNECTION=mysql" \
            "DB_HOST=localhost" \
            "DB_PORT=3306" \
            "DB_DATABASE=${{ secrets.DB_DATABASE }}" \
            "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
            "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            "" \
            "LOG_CHANNEL=single" \
            "CACHE_DRIVER=file" \
            "SESSION_DRIVER=file" \
            "QUEUE_CONNECTION=sync" \
            "" \
            "SANCTUM_STATEFUL_DOMAINS=ngokeng.cdwfs.net" \
            "SESSION_DOMAIN=.ngokeng.cdwfs.net" > backend/.env

      - name: Deploy backend/ → o2switch via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.O2SWITCH_FTP_HOST }}
          username: ${{ secrets.O2SWITCH_FTP_USER }}
          password: ${{ secrets.O2SWITCH_FTP_PASSWORD }}
          local-dir: backend/
          server-dir: ${{ secrets.O2SWITCH_BACKEND_FTP_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
            **/vendor/**
            **/node_modules/**
            **/.env.example

  # ─────────────────────────────────────────────
  #  CD-3b : SONARCLOUD — Scan de sécurité
  # ─────────────────────────────────────────────
  sonarcloud:
    name: "🔍 SonarCloud — Security Scan"
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────────
  #  CD-4 : HEALTHCHECK
  # ─────────────────────────────────────────────
  healthcheck:
    name: "\U0001FA7A Healthcheck"
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Attendre le déploiement (30s)
        run: sleep 30

      - name: Vérifier le frontend
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://ngokeng.cdwfs.net)
          if [ "$STATUS" = "000" ]; then
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" http://ngokeng.cdwfs.net)
          fi
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "301" ] && [ "$STATUS" != "302" ]; then
            echo "❌ Frontend KO — HTTP $STATUS"
            exit 1
          fi
          echo "✅ Frontend OK — HTTP $STATUS"

      - name: Vérifier l'API backend
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://ngokeng.cdwfs.net/api/login -X POST -H "Content-Type: application/json" -d '{}')
          if [ "$STATUS" = "000" ]; then
            echo "❌ API backend injoignable"
            exit 1
          fi
          echo "✅ API backend répond — HTTP $STATUS"
